# ==========================================================================
# UAV-ISAC 约束感知 MLLM - RTX 5090 32GB 多模态烟雾测试配置
# 目标：验证 BEV-image MLLM 的数据、处理器、前向传播、SFT 最小闭环，
# 不以最终训练质量为判断标准。
# ==========================================================================

hardware:
  gpu: "RTX 5090"
  vram_gb: 32
  use_4bit: true
  gradient_checkpointing: true
  max_grad_norm: 1.0

training:
  seed: 42

  sft:
    epochs: 1
    per_device_batch_size: 1
    gradient_accumulation_steps: 8
    learning_rate: 2.0e-4
    lr_scheduler: "cosine"
    warmup_ratio: 0.03
    weight_decay: 0.01
    max_seq_length: 4096
    # Gemma-3-4b-it expects the same multimodal chat layout in control-only
    # SFT, response SFT, diagnostics, and DPO.
    use_chat_template: true
    save_steps: 10
    save_total_limit: 2
    logging_steps: 1

    phase1:
      enabled: true
      lr_lora: 5.0e-4
      lambda_ctl: 1.0
      sensitivity_check_steps: 10
      sensitivity_threshold: 0.1
      max_steps: 30

  dpo:
    epochs: 1
    per_device_batch_size: 1
    gradient_accumulation_steps: 8
    learning_rate: 5.0e-5
    lr_scheduler: "cosine"
    warmup_ratio: 0.03
    beta: 0.1
    mu: 0.0
    max_seq_length: 4096
    save_steps: 10
    save_total_limit: 2
    logging_steps: 1

model:
  backbone: "google/gemma-3-4b-it"
  use_multimodal: true
  freeze_vision_tower: true
  torch_dtype: "bfloat16"
  attn_implementation: "sdpa"

  lora:
    rank: 16
    alpha: 32
    dropout: 0
    target_modules:
      - "q_proj"
      - "k_proj"
      - "v_proj"
      - "o_proj"

  control_token:
    num_tokens: 8
    hidden_dim: 2560

  projection_head:
    hidden_dim: 2560
    mlp_hidden: [256, 256]
    readout_out_dim: 128
    tau_power: 0.5
    tau_assoc: 0.5
    sinkhorn_iters: 20
    # Set only after calibration on the current dataset contract.  The former
    # v3 weights must not be reused after the v5 solver/channel repair.
    q_fixed_cue_weights: null
    q_residual_max_scale: 0.5

  loss:
    lambda_ctl: 0.5
    lambda_q: 1.0
    lambda_a: 0.5
    lambda_p: 0.3
    lambda_p_raw_kl: 0.0
    lambda_sep: 0.1

simulation:
  area_size: [1000, 1000]
  num_uavs: 4
  num_users: 20
  num_targets: 6
  num_antennas_tx: 8
  num_antennas_rx: 8
  carrier_freq_ghz: 5.8
  bandwidth_mhz: 20
  p_max_dbm: 30
  noise_figure_db: 9
  altitude_min_m: 50
  altitude_max_m: 300
  uav_min_separation_m: 10
  uav_max_speed_ms: 15
  slot_duration_s: 1.0
  sinr_c_min_db: 0
  sinr_s_min_db: 10
  rate_min_bps: 1e6
  load_cap_per_uav: 10

data:
  num_environments: 20
  num_restarts: 3
  # Multiple feasible restarts can have almost identical utility but different
  # Q directions. Keep a real solution within 1% of the best utility and use
  # the Q-direction medoid as the canonical Oracle target.
  oracle_selection_mode: "near_optimal_q_medoid"
  oracle_selection_utility_tolerance: 0.01
  pair_margin_rho: 0.2
  dpo_min_pairs_per_sample: 1
  image_size: 224

  modalities:
    use_comm_summary: true
    use_sensing_summary: true
    use_bev_text_grid: false
    use_bev_image: true

  output_dir: "/root/autodl-tmp/data/mm_smoke"
  sft_file: "sft_dataset.jsonl"
  dpo_file: "dpo_dataset.jsonl"
  bev_image_dir: "images"

eval:
  num_test_environments: 20
  baseline_list:
    - "sft_only"

output_dir: "/root/autodl-tmp/outputs/mm_smoke"
checkpoint_dir: "/root/autodl-tmp/checkpoints/mm_smoke"
log_dir: "/root/autodl-tmp/logs/mm_smoke"
