# ==========================================================================
# Constraint-Aware MLLM for UAV-ISAC — RTX 5090 32GB 配置
# 硬件目标: RTX 5090 32GB (Blackwell sm_120)
# 精度: bitsandbytes NF4 4-bit QLoRA (32GB 必须量化)
# ==========================================================================

# ---- 硬件 / 训练 ----
# RTX 5090 32GB — bitsandbytes >= 0.45.3 (sm_120 支持)
# 以下参数均经 2026-07-04 Smoke Test 实测验证, 勿随意改大
# SFT: bs=1, grad_accum=16 (有效 batch=16), 峰值 ~25 GB (bs=2 → OOM)
# DPO: bs=1, seq=1536, mu=0 (有效 batch=16), 峰值 ~30.4 GB
hardware:
  gpu: "RTX 5090"
  vram_gb: 32
  use_4bit: true            # 必须量化 — 32GB 不够 bf16 全精度
  gradient_checkpointing: true
  max_grad_norm: 1.0

training:
  seed: 42
  # Stage I: SFT
  sft:
    epochs: 3                        # 全量生产: 3 epochs
    per_device_batch_size: 1         # bs=1: bs=2 实测 OOM (CE fp32 膨胀 6.75GB)
    gradient_accumulation_steps: 16  # 有效 batch = 1×16 = 16
    learning_rate: 2.0e-4
    lr_scheduler: "cosine"
    warmup_ratio: 0.03
    weight_decay: 0.01
    max_seq_length: 3456             # SFT seq=3456 实测通过 (bs=1)
    save_steps: 100
    save_total_limit: 3
    save_full_state: true
    logging_steps: 10

    # Phase 1: CTL-only warmup (控制表示预训练)
    phase1:
      enabled: true
      lr_lora: 5.0e-4
      lambda_ctl: 1.0
      sensitivity_check_steps: 50
      sensitivity_threshold: 0.1
      max_steps: 250

  # Stage II: DPO
  dpo:
    epochs: 2
    per_device_batch_size: 1         # bs=1: 双模型 + 4×forward, 峰值 ~22 GB
    gradient_accumulation_steps: 16  # 有效 batch = 1×16 = 16
    learning_rate: 5.0e-5
    lr_scheduler: "cosine"
    warmup_ratio: 0.03
    beta: 0.1                        # DPO temperature (论文值)
    mu: 0.0                          # SFT anchor 关闭 (开启导致 backward OOM)
    max_seq_length: 1536             # 3456/2048 均实测 OOM, 1536 通过
    save_steps: 100
    logging_steps: 10

# ---- 模型 ----
model:
  backbone: "google/gemma-3-4b-it"   # HF Hub 直接下载 (RTX 5090 未预缓存)
  use_multimodal: false              # 文本版先跑通
  torch_dtype: "bfloat16"
  attn_implementation: "sdpa"        # PyTorch 原生 SDPA → cuDNN Fused Attention

  lora:
    rank: 16
    alpha: 32
    dropout: 0                       # bnb 不支持 flash-attn kernel; dropout 不影响性能
    target_modules:
      - "q_proj"
      - "k_proj"
      - "v_proj"
      - "o_proj"

  # Control Token
  control_token:
    num_tokens: 8
    hidden_dim: 2560                 # Gemma 3 4B 的 hidden_size

  # Projection Head
  projection_head:
    hidden_dim: 2560
    mlp_hidden: [256, 256]
    readout_out_dim: 128
    tau_power: 0.5
    tau_assoc: 0.5
    sinkhorn_iters: 20

  # Loss weights
  loss:
    lambda_ctl: 0.5
    lambda_q: 1.0
    lambda_a: 0.5
    lambda_p: 0.3
    lambda_sep: 0.1

# ---- 仿真环境 ----
simulation:
  area_size: [1000, 1000]
  num_uavs: 4                        # M = 4
  num_users: 20                      # K = 20
  num_targets: 6                     # T = 6
  num_antennas_tx: 8                 # N_t
  num_antennas_rx: 8                 # N_r
  carrier_freq_ghz: 5.8              # f_c
  bandwidth_mhz: 20                  # B
  p_max_dbm: 30                      # P_m^max
  noise_figure_db: 9
  altitude_min_m: 50                 # H_min
  altitude_max_m: 300                # H_max
  uav_min_separation_m: 10           # d_min
  uav_max_speed_ms: 15               # v_max
  slot_duration_s: 1.0               # Δt
  sinr_c_min_db: 0                   # Γ_c^min
  sinr_s_min_db: 10                  # Γ_s^min
  rate_min_bps: 1e6                  # R_k^min
  load_cap_per_uav: 10               # K_m^max

# ---- 数据生成 ----
data:
  num_environments: 5000
  num_restarts: 10
  pair_margin_rho: 0.2
  dpo_min_pairs_per_sample: 2

  modalities:
    use_comm_summary: true
    use_sensing_summary: true
    use_bev_text_grid: true
    use_bev_image: false

  output_dir: "/root/autodl-tmp/data/full_v2"
  sft_file: "sft_dataset.jsonl"
  dpo_file: "dpo_dataset.jsonl"

# ---- 评估 ----
eval:
  num_test_environments: 200
  baseline_list:
    - "csi_only"
    - "isac_sca"
    - "drl_assisted"
    - "single_modal_frozen"
    - "moe_baseline"
    - "frozen_prompting"
    - "sft_only"
    - "dpo_only"
    - "sft_dpo_no_head"

# ---- 输出 ----
output_dir: "/root/autodl-tmp/outputs"
checkpoint_dir: "/root/autodl-tmp/checkpoints"
log_dir: "/root/autodl-tmp/logs"
